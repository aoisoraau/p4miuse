<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>描寫角度小教室｜小四中文</title>
<style>
  :root{
    --sky1:#8fb8d6; --sky2:#e8d9b8;
    --panel:#f5f0e4; --ink:#46413a; --ink-soft:#8a8174;
    --card:#fbf7ee;
    --accent:#5ba8e0;
    --radius:22px;
    font-size:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 100%);
    display:grid;
    grid-template-columns:1fr 392px;
    height:100vh;
    overflow:hidden;
  }

  /* ---------- 左：3D 舞台 ---------- */
  #stage{position:relative; min-width:0;}
  #stage canvas{display:block; width:100%; height:100%; touch-action:none; cursor:grab;}
  #stage canvas:active{cursor:grabbing;}

  .floatTitle{
    position:absolute; top:18px; left:18px;
    background:rgba(255,255,255,.85); backdrop-filter:blur(6px);
    border-radius:var(--radius); padding:12px 20px;
    box-shadow:0 6px 18px rgba(90,70,40,.12);
    pointer-events:none;
  }
  .floatTitle .eyebrow{font-size:.8rem; letter-spacing:.35em; color:var(--ink-soft); font-weight:700;}
  .floatTitle h1{margin:2px 0 0; font-size:1.45rem; letter-spacing:.08em;}
  .floatTitle h1 span{color:var(--accent); transition:color .4s;}

  .dragHint{
    position:absolute; left:18px; bottom:18px;
    background:rgba(70,65,58,.78); color:#fff;
    font-size:.85rem; padding:9px 16px; border-radius:999px;
    pointer-events:none; letter-spacing:.05em;
  }

  /* ---------- 右：控制面板 ---------- */
  aside{
    background:var(--panel);
    border-left:4px solid rgba(90,70,40,.07);
    padding:22px 22px 28px;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:18px;
  }
  aside h2{
    margin:0; font-size:1.05rem; letter-spacing:.2em; color:var(--ink-soft);
    display:flex; align-items:center; gap:10px;
  }
  aside h2::after{content:""; flex:1; height:3px; border-radius:3px;
    background:linear-gradient(90deg,rgba(90,70,40,.12),transparent);}

  .btns{display:flex; flex-direction:column; gap:12px;}
  .viewBtn{
    --c:#ccc;
    display:flex; align-items:center; gap:14px;
    background:var(--card);
    border:3px solid rgba(90,70,40,.08);
    border-radius:var(--radius);
    padding:13px 16px;
    font-family:inherit; color:var(--ink);
    cursor:pointer; text-align:left;
    box-shadow:0 4px 0 rgba(90,70,40,.10);
    transition:transform .12s, box-shadow .12s, border-color .2s, background .2s;
  }
  .viewBtn .icon{
    width:52px; height:52px; flex:none;
    display:grid; place-items:center;
    font-size:1.7rem;
    background:color-mix(in srgb, var(--c) 18%, white);
    border-radius:16px;
  }
  .viewBtn .name{font-size:1.35rem; font-weight:800; letter-spacing:.12em; line-height:1.15;}
  .viewBtn .hint{font-size:.84rem; color:var(--ink-soft); margin-top:2px;}
  .viewBtn:hover{transform:translateY(-2px); box-shadow:0 7px 0 rgba(90,70,40,.12);}
  .viewBtn:active{transform:translateY(2px) scale(.97); box-shadow:0 1px 0 rgba(90,70,40,.12);}
  .viewBtn.active{
    border-color:var(--c);
    background:color-mix(in srgb, var(--c) 10%, white);
  }
  .viewBtn.active .name{color:var(--c);}
  .viewBtn:focus-visible{outline:3px dashed var(--c); outline-offset:3px;}
  .keycap{
    margin-left:auto; flex:none;
    font-size:.75rem; color:var(--ink-soft);
    border:2px solid rgba(90,70,40,.15); border-bottom-width:4px;
    border-radius:8px; padding:2px 8px;
  }

  /* ---------- 詞語卡 ---------- */
  .infoCard{
    background:var(--card);
    border-radius:var(--radius);
    border:3px solid color-mix(in srgb, var(--accent) 55%, white);
    box-shadow:0 8px 22px color-mix(in srgb, var(--accent) 18%, transparent);
    padding:18px 20px 20px;
    transition:border-color .4s, box-shadow .4s;
  }
  .infoCard .badge{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--accent); color:#fff;
    font-size:1.1rem; font-weight:800; letter-spacing:.18em;
    padding:6px 18px 6px 14px; border-radius:999px;
    transition:background .4s;
  }
  .infoCard .tip{margin:12px 0 6px; font-size:.92rem; color:var(--ink-soft); line-height:1.6;}
  .chips{display:flex; flex-wrap:wrap; gap:9px; margin:10px 0 4px;}
  .chip{
    background:color-mix(in srgb, var(--accent) 14%, white);
    color:color-mix(in srgb, var(--accent) 70%, var(--ink));
    border:2px solid color-mix(in srgb, var(--accent) 35%, white);
    font-size:1.08rem; font-weight:800; letter-spacing:.1em;
    padding:7px 16px; border-radius:999px;
    animation:pop .45s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  .chip:nth-child(2){animation-delay:.1s}
  .chip:nth-child(3){animation-delay:.2s}
  @keyframes pop{from{transform:scale(.3); opacity:0}}
  .sentence{
    margin-top:12px;
    background:color-mix(in srgb, var(--accent) 7%, #fffdf4);
    border-left:6px solid var(--accent);
    border-radius:12px;
    padding:12px 14px;
    font-size:1.06rem; line-height:1.9; letter-spacing:.04em;
    animation:slideIn .5s ease backwards; animation-delay:.15s;
  }
  .sentence b{color:var(--accent);}
  .sentence .label{display:block; font-size:.78rem; letter-spacing:.3em; color:var(--ink-soft); margin-bottom:2px;}
  @keyframes slideIn{from{transform:translateY(10px); opacity:0}}

  footer{font-size:.78rem; color:var(--ink-soft); text-align:center; letter-spacing:.08em;}

  @media (prefers-reduced-motion:reduce){
    .chip,.sentence{animation:none}
  }
  /* ---------- 手機直向 ---------- */
  @media (max-width:820px){
    body{grid-template-columns:1fr; grid-template-rows:52vh 1fr; height:100dvh;}
    aside{border-left:none; border-top:4px solid rgba(90,70,40,.07); padding:16px;}
    .btns{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .viewBtn{padding:10px 12px; gap:10px;}
    .viewBtn .icon{width:42px; height:42px; font-size:1.35rem; border-radius:13px;}
    .viewBtn .name{font-size:1.12rem;}
    .viewBtn .hint{font-size:.74rem;}
    .keycap{display:none;}
    .floatTitle h1{font-size:1.15rem;}
    .dragHint{font-size:.74rem;}
  }
</style>
</head>
<body>

  <!-- 3D 舞台 -->
  <div id="stage">
    <div class="floatTitle">
      <div class="eyebrow">小四中文・觀察與描寫</div>
      <h1>描寫角度小教室 <span id="titleAngle">平視</span></h1>
    </div>
    <div class="dragHint">🖐️ 拖一拖：旋轉　｜　🔍 滾輪／雙指：放大縮小</div>
  </div>

  <!-- 控制面板 -->
  <aside>
    <h2>📷 選一個角度看佛像</h2>
    <div class="btns" id="btns"></div>

    <h2>✏️ 描寫小寶箱</h2>
    <div class="infoCard" id="infoCard">
      <span class="badge" id="badge"></span>
      <p class="tip" id="tip"></p>
      <div class="chips" id="chips"></div>
      <div class="sentence" id="sentence"></div>
    </div>

    <footer>先轉一轉、再看一看：同一尊佛像，不同角度，感覺大不同！</footer>
  </aside>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";

/* ====================== 五個描寫角度資料 ====================== */
const VIEWS = {
  pingshi:{ name:"平視", icon:"👀", key:"1", color:"#5ba8e0",
    hint:"視線和佛像一樣高",
    tip:"平視：眼睛和對象差不多高，最適合仔細描寫表情和細節。",
    pos:[0, 2.7, 7.6], tgt:[0, 2.7, 0],
    words:["莊嚴","慈祥","安詳"],
    sentence:"我平視佛像，看見他慈祥的面容，嘴角帶着一絲安詳的微笑。"},
  yangshi:{ name:"仰視", icon:"⬆️", key:"2", color:"#8b7bd8",
    hint:"由低處抬頭向上望",
    tip:"仰視：從低處往上看，對象會顯得又高又大，使人敬畏。",
    pos:[0, 0.8, 5.4], tgt:[0, 3.5, 0],
    words:["高大","雄偉","肅然起敬"],
    sentence:"我抬頭仰視，佛像顯得格外高大雄偉，令人肅然起敬。"},
  fushi:{ name:"俯視", icon:"⬇️", key:"3", color:"#4fb286",
    hint:"從高處往下望",
    tip:"俯視：站在高處往下看，可以看清整體和全貌。",
    pos:[0, 8.6, 6.8], tgt:[0, 1.1, 0],
    words:["全貌","開闊","渺小"],
    sentence:"我站在高處俯視，佛像和蓮花座的全貌盡收眼底，四周的小樹顯得十分渺小。"},
  yuanwang:{ name:"遠望", icon:"🔭", key:"4", color:"#f2a65a",
    hint:"站在遠處眺望",
    tip:"遠望：從遠處眺望，只能看見大概的輪廓和周圍的環境。",
    pos:[0, 3.5, 16.5], tgt:[0, 2.3, 0],
    words:["輪廓","隱約","矗立"],
    sentence:"我站在遠處遠望，佛像的輪廓隱約矗立在綠樹之間。"},
  jinguan:{ name:"近觀", icon:"🔍", key:"5", color:"#e0719a",
    hint:"走近仔細地看",
    tip:"近觀：走到跟前仔細看，連最小的細節都一清二楚。",
    pos:[1.1, 3.5, 2.0], tgt:[0, 3.4, 0],
    words:["清晰","細緻","栩栩如生"],
    sentence:"我近觀佛像，螺髮和笑容都清晰可見，雕工細緻，栩栩如生。"}
};

/* ====================== 場景基礎 ====================== */
const stage = document.getElementById("stage");
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xa8c2d4, 0.012);

const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 120);
camera.position.set(...VIEWS.pingshi.pos);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
stage.appendChild(renderer.domElement);

function resize(){
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);

/* 燈光：温柔明亮 */
scene.add(new THREE.HemisphereLight(0xf2e6cf, 0x9fb8a4, 0.62));
const sun = new THREE.DirectionalLight(0xf5dcb0, 0.55);
sun.position.set(6, 11, 7);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.12));

/* ====================== 材質（低多邊形 flat shading） ====================== */
function mat(c, opts){ return new THREE.MeshStandardMaterial(Object.assign({color:c, flatShading:true, roughness:.85, metalness:0}, opts||{})); }
const M = {
  skin : mat(0xf3c79b),
  robe : mat(0xe8a455),
  robe2: mat(0xd98e3f),
  hair : mat(0x4d5d8c),
  lotusA: mat(0xf2a7bb),
  lotusB: mat(0xf8c6d3),
  lotusBase: mat(0xd9a86c),
  halo : mat(0xe8c070, {emissive:0xd9a945, emissiveIntensity:.35, roughness:.4}),
  ground: mat(0xbfe0b8),
  trunk: mat(0xa9805c),
  leaf : mat(0x8fcf8a),
  leaf2: mat(0x7bbf90),
  cloud: mat(0xffffff, {roughness:1}),
  stone: mat(0xd8d2c4),
  lip  : mat(0xc96b5b),
  dark : mat(0x5a4a3e)
};

/* 小工具：兩點之間的圓柱（手臂用） */
function limb(from, to, r, m){
  const a = new THREE.Vector3(...from), b = new THREE.Vector3(...to);
  const dir = new THREE.Vector3().subVectors(b, a);
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, dir.length(), 7), m);
  mesh.position.copy(a).add(b).multiplyScalar(0.5);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  return mesh;
}

/* ====================== 組裝佛像 ====================== */
const buddha = new THREE.Group();
scene.add(buddha);

/* —— 蓮花座 —— */
const lotus = new THREE.Group();
lotus.add(new THREE.Mesh(new THREE.CylinderGeometry(1.9, 2.25, 0.55, 14), M.lotusBase).translateY(0.28));
lotus.add(new THREE.Mesh(new THREE.CylinderGeometry(2.05, 1.6, 0.32, 14), M.lotusBase).translateY(0.71));
function petalRing(count, radius, y, tilt, scale, m, offset){
  for(let i=0;i<count;i++){
    const ang = (i/count)*Math.PI*2 + (offset||0);
    const p = new THREE.Mesh(new THREE.ConeGeometry(0.45, 1.05, 4), m);
    p.scale.set(scale, scale, scale*0.45);
    p.position.set(Math.sin(ang)*radius, y, Math.cos(ang)*radius);
    p.rotation.order = "YXZ";
    p.rotation.y = ang;
    p.rotation.x = tilt;
    lotus.add(p);
  }
}
petalRing(12, 1.95, 0.55, -1.05, 1.05, M.lotusA, 0);       // 外層花瓣（外張）
petalRing(9,  1.5,  0.78, -0.62, 0.92, M.lotusB, 0.35);    // 內層花瓣（較直）
buddha.add(lotus);

/* —— 盤坐的身體 —— */
const legs = new THREE.Mesh(new THREE.SphereGeometry(1.35, 12, 9), M.robe);
legs.scale.set(1.18, 0.42, 0.95); legs.position.y = 1.02;
buddha.add(legs);
[-1,1].forEach(s=>{                                           // 兩個膝蓋
  const knee = new THREE.Mesh(new THREE.SphereGeometry(0.42, 10, 8), M.robe);
  knee.position.set(s*0.98, 1.04, 0.3);
  buddha.add(knee);
});

const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.56, 1.02, 1.55, 10), M.robe);
torso.position.y = 2.05;
buddha.add(torso);

const shoulders = new THREE.Mesh(new THREE.SphereGeometry(0.52, 12, 9), M.robe);
shoulders.scale.set(1.65, 0.66, 0.95); shoulders.position.y = 2.74;
buddha.add(shoulders);

/* 袈裟：斜披的衣帶 + 衣領 */
const sash = new THREE.Mesh(new THREE.TorusGeometry(0.78, 0.13, 6, 14), M.robe2);
sash.position.set(0, 2.25, 0.06);
sash.rotation.set(Math.PI/2.25, 0, 0.5);
buddha.add(sash);
const collar = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.09, 6, 12), M.robe2);
collar.position.y = 3.02; collar.rotation.x = Math.PI/2;
buddha.add(collar);

/* —— 手臂與合十的雙手 —— */
[-1,1].forEach(s=>{
  buddha.add(limb([s*0.82, 2.66, 0.05], [s*0.6, 1.95, 0.45], 0.17, M.robe));   // 上臂
  buddha.add(limb([s*0.6, 1.95, 0.45], [s*0.12, 2.18, 0.72], 0.14, M.robe2)); // 前臂
});
const hands = new THREE.Group();
[-1,1].forEach(s=>{
  const palm = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.52, 0.22), M.skin);
  palm.position.x = s*0.05;
  palm.rotation.z = -s*0.1;
  hands.add(palm);
});
const fingerTip = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 6), M.skin);
fingerTip.scale.set(0.9, 0.6, 1); fingerTip.position.y = 0.27;
hands.add(fingerTip);
hands.position.set(0, 2.22, 0.74);
buddha.add(hands);

/* —— 頸與頭 —— */
buddha.add(new THREE.Mesh(new THREE.CylinderGeometry(0.21, 0.25, 0.32, 8), M.skin).translateY(3.05));
const HEAD = new THREE.Vector3(0, 3.58, 0);
const head = new THREE.Mesh(new THREE.SphereGeometry(0.53, 12, 10), M.skin);
head.scale.set(0.96, 1.06, 0.96); head.position.copy(HEAD);
buddha.add(head);

/* 耳朵＋長耳垂 */
[-1,1].forEach(s=>{
  const ear = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.085, 0.34, 6), M.skin);
  ear.position.set(s*0.51, HEAD.y - 0.02, 0);
  buddha.add(ear);
  const lobe = new THREE.Mesh(new THREE.SphereGeometry(0.095, 8, 6), M.skin);
  lobe.position.set(s*0.51, HEAD.y - 0.24, 0);
  buddha.add(lobe);
});

/* 簡化螺髮：一圈圈小球蓋在頭頂與後腦 */
const curlGeo = new THREE.SphereGeometry(0.085, 6, 5);
for(let row=0; row<5; row++){
  const phi = 0.16 + row*0.3;
  const count = Math.max(6, Math.round(Math.sin(phi)*26));
  for(let i=0;i<count;i++){
    const th = (i/count)*Math.PI*2 + row*0.33;
    const x = 0.52*Math.sin(phi)*Math.sin(th);
    const y = 0.55*Math.cos(phi);
    const z = 0.52*Math.sin(phi)*Math.cos(th);
    if (z > 0.2 && y < 0.34) continue;     // 額頭前方不長頭髮
    if (row === 4 && z > 0.05) continue;   // 最低一排只留後腦
    const c = new THREE.Mesh(curlGeo, M.hair);
    c.position.set(HEAD.x + x, HEAD.y + y, HEAD.z + z);
    buddha.add(c);
  }
}
/* 肉髻（頭頂小髮髻） */
const bun = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 7), M.hair);
bun.position.set(0, HEAD.y + 0.62, 0);
buddha.add(bun);
for(let i=0;i<5;i++){
  const th = (i/5)*Math.PI*2;
  const c = new THREE.Mesh(curlGeo, M.hair);
  c.position.set(Math.sin(th)*0.13, HEAD.y + 0.7, Math.cos(th)*0.13);
  buddha.add(c);
}

/* 温和的臉：閉目微笑（向上彎的弧） */
function smileArc(r, tube, x, y, z, m){
  const arc = new THREE.Mesh(new THREE.TorusGeometry(r, tube, 6, 12, Math.PI*0.9), m);
  arc.position.set(x, y, z);
  arc.rotation.z = Math.PI + Math.PI*0.05;   // 弧口朝上 → ⌣
  return arc;
}
buddha.add(smileArc(0.085, 0.014, -0.18, HEAD.y + 0.06, 0.47, M.dark)); // 左眼
buddha.add(smileArc(0.085, 0.014,  0.18, HEAD.y + 0.06, 0.47, M.dark)); // 右眼
buddha.add(smileArc(0.07, 0.016, 0, HEAD.y - 0.22, 0.48, M.lip));        // 微笑
const urna = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 5), M.halo); // 眉心白毫
urna.position.set(0, HEAD.y + 0.16, 0.51);
buddha.add(urna);

/* 背光光環 */
const halo = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.06, 8, 28), M.halo);
halo.position.set(0, HEAD.y + 0.05, -0.55);
buddha.add(halo);

/* ====================== 環境：草地、小樹、白雲 ====================== */
scene.add(new THREE.Mesh(new THREE.CylinderGeometry(14, 14, 0.3, 24), M.ground).translateY(-0.15));

function tree(x, z, s, leafM){
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.1*s, 0.14*s, 0.7*s, 6), M.trunk).translateY(0.35*s));
  g.add(new THREE.Mesh(new THREE.ConeGeometry(0.55*s, 1.2*s, 7), leafM).translateY(1.25*s));
  g.position.set(x, 0, z);
  scene.add(g);
}
tree(-4.6, -2.2, 1.2, M.leaf);  tree(4.8, -1.4, 1.0, M.leaf2);
tree(-3.6, 3.4, 0.85, M.leaf2); tree(3.4, 4.0, 1.1, M.leaf);
tree(-6.2, 1.6, 0.9, M.leaf);   tree(6.0, 2.6, 0.8, M.leaf2);
[[2.6,-3.1,.28],[-2.3,2.9,.22],[5.2,.8,.3]].forEach(([x,z,r])=>{
  const s = new THREE.Mesh(new THREE.IcosahedronGeometry(r, 0), M.stone);
  s.position.set(x, r*0.7, z);
  scene.add(s);
});

const clouds = [];
function cloud(x, y, z, s){
  const g = new THREE.Group();
  [[0,0,0,.55],[.55,.08,.1,.4],[-.5,.05,-.05,.38],[.15,.3,0,.34]].forEach(([cx,cy,cz,r])=>{
    g.add(new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), M.cloud)
      .translateX(cx).translateY(cy).translateZ(cz));
  });
  g.scale.setScalar(s);
  g.position.set(x, y, z);
  scene.add(g); clouds.push(g);
}
cloud(-4.5, 5.6, -2.5, 1.3);
cloud(3.8, 6.6, -3.5, 1.6);
cloud(0.5, 5.2, 3.8, 1.0);

/* ====================== 軌道控制（拖動旋轉＋縮放） ====================== */
const ctrl = {
  target: new THREE.Vector3(...VIEWS.pingshi.tgt),
  sph: new THREE.Spherical(),
  sync(){
    this.sph.setFromVector3(new THREE.Vector3().subVectors(camera.position, this.target));
  },
  update(){
    this.sph.radius = Math.max(2.0, Math.min(18, this.sph.radius));
    // 垂直角度限制：上方不可翻頂，下方不可鑽進地面（鏡頭高度至少 0.35）
    const cosMin = Math.max(-1, Math.min(1, (0.35 - this.target.y) / this.sph.radius));
    const phiMax = Math.acos(cosMin) - 0.02;
    this.sph.phi = Math.max(0.2, Math.min(phiMax, this.sph.phi));
    camera.position.copy(this.target).add(new THREE.Vector3().setFromSpherical(this.sph));
    camera.lookAt(this.target);
  }
};
ctrl.sync();

let tween = null;
function cancelTween(){ if(tween){ tween = null; ctrl.sync(); } }

const pointers = new Map();
let pinchDist = 0;
const cv = renderer.domElement;

cv.addEventListener("pointerdown", e=>{
  cv.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size === 2){
    const [a,b] = [...pointers.values()];
    pinchDist = Math.hypot(a.x-b.x, a.y-b.y);
  }
});
cv.addEventListener("pointermove", e=>{
  if(!pointers.has(e.pointerId)) return;
  const p = pointers.get(e.pointerId);
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;
  cancelTween();
  if(pointers.size === 1){
    ctrl.sph.theta -= dx * 0.005;
    ctrl.sph.phi   -= dy * 0.005;
  } else if(pointers.size === 2){
    const [a,b] = [...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    if(pinchDist > 0) ctrl.sph.radius *= pinchDist / d;
    pinchDist = d;
  }
});
function endPointer(e){ pointers.delete(e.pointerId); pinchDist = 0; }
cv.addEventListener("pointerup", endPointer);
cv.addEventListener("pointercancel", endPointer);
cv.addEventListener("wheel", e=>{
  e.preventDefault();
  cancelTween();
  ctrl.sph.radius *= 1 + e.deltaY * 0.001;
}, {passive:false});

/* ====================== 鏡頭飛行 ====================== */
const ease = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
function flyTo(v){
  tween = {
    t:0, dur:1.3,
    fromP:camera.position.clone(), toP:new THREE.Vector3(...v.pos),
    fromT:ctrl.target.clone(),     toT:new THREE.Vector3(...v.tgt)
  };
}

/* ====================== 介面 ====================== */
const btnBox = document.getElementById("btns");
const badge = document.getElementById("badge");
const tip = document.getElementById("tip");
const chips = document.getElementById("chips");
const sentenceBox = document.getElementById("sentence");
const titleAngle = document.getElementById("titleAngle");

Object.entries(VIEWS).forEach(([key, v])=>{
  const b = document.createElement("button");
  b.className = "viewBtn";
  b.style.setProperty("--c", v.color);
  b.dataset.key = key;
  b.innerHTML = `<span class="icon">${v.icon}</span>
    <span><span class="name">${v.name}</span><div class="hint">${v.hint}</div></span>
    <span class="keycap">${v.key}</span>`;
  b.addEventListener("click", ()=>setView(key));
  btnBox.appendChild(b);
});

function setView(key, instant){
  const v = VIEWS[key];
  document.querySelectorAll(".viewBtn").forEach(b=>b.classList.toggle("active", b.dataset.key === key));
  document.documentElement.style.setProperty("--accent", v.color);
  titleAngle.textContent = v.name;
  badge.textContent = `${v.icon} ${v.name}`;
  tip.textContent = v.tip;
  chips.innerHTML = v.words.map(w=>`<span class="chip">${w}</span>`).join("");
  const html = v.sentence.replace(new RegExp(v.name + "|" + v.words.join("|"), "g"), m=>`<b>${m}</b>`);
  sentenceBox.innerHTML = `<span class="label">例　句</span>${html}`;
  sentenceBox.style.animation = "none"; void sentenceBox.offsetWidth;
  sentenceBox.style.animation = "";
  if(instant){
    camera.position.set(...v.pos);
    ctrl.target.set(...v.tgt);
    ctrl.sync();
  } else {
    flyTo(v);
  }
}
window.addEventListener("keydown", e=>{
  const hit = Object.entries(VIEWS).find(([,v])=>v.key === e.key);
  if(hit) setView(hit[0]);
});
setView("pingshi", true);

/* ====================== 動畫迴圈 ====================== */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  clouds.forEach((c,i)=>{
    c.position.x += dt * (0.15 + i*0.05);
    if(c.position.x > 9) c.position.x = -9;
  });
  halo.scale.setScalar(1 + Math.sin(t*1.6)*0.03);
  halo.material.emissiveIntensity = 0.32 + Math.sin(t*1.6)*0.08;

  if(tween){
    tween.t += dt;
    const k = ease(Math.min(1, tween.t / tween.dur));
    camera.position.lerpVectors(tween.fromP, tween.toP, k);
    ctrl.target.lerpVectors(tween.fromT, tween.toT, k);
    camera.lookAt(ctrl.target);
    if(tween.t >= tween.dur){ tween = null; ctrl.sync(); }
  } else {
    ctrl.update();
  }
  renderer.render(scene, camera);
}
resize();
animate();
</script>
</body>
